# Auto-deploy via GitHub Actions
site_name: "비개발자 바이브코딩 교육 — 2주차 실습 가이드"
site_description: "비개발자를 위한 AI 코딩 에이전트 실습 교육 위키"
site_author: "AI 팀"

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  font:
    text: Noto Sans KR
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

nav:
  - 홈: index.md
  - "실습 1 | 모집요강에서 서비스 데이터 추출하기":
    - 개요: practice1/index.md
    - "Stage 0. 일단 시켜보기": practice1/stage0.md
    - "Stage 1. 디테일 채워주기": practice1/stage1.md
    - "Stage 2. 자동화 설계 + 검증": practice1/stage2.md
    - "마무리. Skill 맛보기": practice1/stage4.md
    - "부록. 자동 허가 모드 설정": practice1/autoapprove.md
    - "부록. 에러 대처와 프롬프트 팁": practice1/appendix.md
    - "참고. 세부 메모": practice1/reference.md
  - "실습 2 | 수학 교재 디지털화 작업":
    - 개요: practice2/index.md
    - "Stage 0. AI에게 상황 설명하기": practice2/stage0.md
    - "Stage 1. PDF → 사진 변환 & 문제 페이지 골라내기": practice2/stage1.md
    - "Stage 2. 문제를 찾아서 한 장씩 잘라내기": practice2/stage2.md
    - "Stage 2b. 도형/그래프 추출 (선택)": practice2/stage2b.md
    - "Stage 3. 사람 확인 및 엑셀 정리": practice2/stage3.md
    - "Stage 4. Skill화": practice2/stage4.md
    - "부록. 자동 허가 모드 설정": practice2/autoapprove.md
    - "부록. 피드백 방법과 에러 대처": practice2/appendix.md
  - "실습 3 | 이미지 공고 → 캐치 폼 변환 웹앱":
    - 개요: practice3/index.md
    - "1. 결과를 담을 빈 양식 만들기": practice3/stage1.md
    - "2. 이미지 공고에서 정보 뽑아 양식 채우기": practice3/stage2.md
    - "3. 웹 화면 붙이고 직접 써보기": practice3/stage3.md
    - "부록. 자동 허가 모드 설정": practice3/autoapprove.md
